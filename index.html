<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yamin Ahmed Vlog | Live Cam</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        .container { padding: 20px; padding-bottom: 80px; }
        .id-display { font-size: 40px; color: #00ffcc; font-weight: bold; margin: 20px 0; background: #1a1a1a; padding: 10px; border-radius: 10px; border: 2px solid #333; }
        video { width: 100%; max-width: 600px; border-radius: 15px; background: #222; border: 2px solid #00ffcc; transform: scaleX(-1); } /* scaleX(-1) mirrors camera for natural feel */
        button { background: #00ffcc; color: #000; border: none; padding: 18px; border-radius: 10px; font-weight: bold; width: 100%; max-width: 400px; font-size: 18px; margin: 10px 0; }
        input { width: 80%; max-width: 300px; padding: 15px; border-radius: 10px; border: none; font-size: 20px; text-align: center; margin-bottom: 10px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: red; color: white; height: 50px; line-height: 50px; overflow: hidden; white-space: nowrap; font-weight: bold; }
        .scroll { display: inline-block; animation: scroll 15s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #00ffcc;">Yamin Ahmed Vlog</h1>
    <p>Your Connection ID:</p>
    <div id="my-id" class="id-display">Connecting...</div>

    <div id="phone-ui">
        <button onclick="startCamera()">TAP TO START CAMERA</button>
        <p style="font-size: 12px; color: #888;">(Works on iPhone & Android)</p>
    </div>

    <hr style="border: 1px solid #333; margin: 30px 0;">

    <div id="pc-ui">
        <input type="text" id="remote-id" placeholder="Enter ID from Phone">
        <button style="background: white;" onclick="connectToPhone()">WATCH LIVE FROM PC</button>
    </div>

    <video id="videoFeed" autoplay playsinline></video>
</div>

<div class="footer">
    <div class="scroll">
        SUBSCRIBE TO YAMIN AHMED VLOG ON YOUTUBE! @YaminOfficial-iq3wp • LIVE LOW LATENCY STREAMING ACTIVE • ENJOY THE VLOG!
    </div>
</div>

<script>
    const randomId = Math.floor(10000000 + Math.random() * 90000000).toString();
    const peer = new Peer(randomId);
    let localStream;

    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
    });

    // START CAMERA (Phone Side)
    async function startCamera() {
        try {
            // navigator.mediaDevices.getUserMedia is supported on ALL iPhones
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user" }, // Use "environment" for back camera
                audio: true
            });
            document.getElementById('videoFeed').srcObject = localStream;
            alert("Camera Active! Now enter ID " + randomId + " on your Computer.");
        } catch (err) {
            alert("Error: " + err.message);
        }
    }

    // CONNECT (PC Side)
    function connectToPhone() {
        const idToCall = document.getElementById('remote-id').value;
        const call = peer.call(idToCall, null); // PC calls the phone
        
        call.on('stream', (remoteStream) => {
            const vid = document.getElementById('videoFeed');
            vid.srcObject = remoteStream;
            vid.style.transform = "scaleX(1)"; // Un-mirror for the viewer
        });
    }

    // ANSWER (Phone Side)
    peer.on('call', (call) => {
        call.answer(localStream); // Phone sends its camera stream to the PC
    });
</script>

</body>
</html>
