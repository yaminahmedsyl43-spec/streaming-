<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamin Ahmed | Mirror System</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .box { border: 2px solid #00ffcc; padding: 20px; border-radius: 20px; background: #111; max-width: 500px; margin: auto; }
        #my-id { font-size: 35px; color: #00ffcc; font-weight: bold; display: block; margin: 15px 0; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-green { background: #00ffcc; color: #000; }
        .btn-white { background: #fff; color: #000; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: none; text-align: center; font-size: 18px; }
        video { width: 100%; margin-top: 20px; border-radius: 10px; background: #222; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: red; height: 40px; line-height: 40px; overflow: hidden; }
        .ticker { display: inline-block; white-space: nowrap; animation: move 15s linear infinite; font-weight: bold; }
        @keyframes move { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="box">
    <h2>Yamin Ahmed Vlog</h2>
    <p>Mobile ID:</p>
    <span id="my-id">Connecting...</span>

    <button class="btn-green" onclick="tryScreenShare()">START SHARING SCREEN</button>
    <p style="font-size: 11px; color: #888;">If Screen fails, it will ask for Camera.</p>

    <hr style="border: 0.5px solid #333; margin: 20px 0;">

    <input type="text" id="remote-id" placeholder="Enter Mobile ID">
    <button class="btn-white" onclick="watchOnPC()">CONNECT & WATCH</button>

    <video id="display" autoplay playsinline></video>
</div>

<div class="footer">
    <div class="ticker">SUBSCRIBE TO YAMIN AHMED VLOG @YaminOfficial-iq3wp • LIVE MIRRORING SYSTEM ACTIVE</div>
</div>

<script>
    const rid = Math.floor(10000000 + Math.random() * 90000000).toString();
    const peer = new Peer(rid);
    let stream;

    peer.on('open', (id) => { document.getElementById('my-id').innerText = id; });

    async function tryScreenShare() {
        try {
            // This is the part that usually fails on iPhone
            stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        } catch (e) {
            console.log("Screen share blocked, trying Camera fallback...");
            // Fallback for iPhone: If Screen Share is blocked, it opens Camera
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        }
        document.getElementById('display').srcObject = stream;
    }

    function watchOnPC() {
        const id = document.getElementById('remote-id').value;
        const call = peer.call(id, null);
        call.on('stream', (s) => {
            document.getElementById('display').srcObject = s;
        });
    }

    peer.on('call', (call) => {
        call.answer(stream);
    });
</script>
</body>
</html>
